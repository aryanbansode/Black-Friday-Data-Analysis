apiVersion: v1
kind: Pod
metadata:
  name: mypod4
spec:
  containers:
  - name: mycontainer4
    image: nginx
    ports:
    - containerPort: 80
    volumeMounts:
    - name: myvolume
      mountPath: /usr/share/nginx/html

  volumes:
  - name: myvolume
    persistentVolumeClaim:
      claimName: mypvc