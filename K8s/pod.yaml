apiVersion: v1
kind: Pod
metadata:
  name: mypod4
  labels:
    app: myapp4
spec:
  containers:
  - name: mycontainer4
    image: aryanbansode/b20:myhttpd
    ports:
    - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: myservice4
spec:
  type: NodePort
  selector:
    app: myapp4
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80