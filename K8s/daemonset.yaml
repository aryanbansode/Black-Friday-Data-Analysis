apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mydaemonset
  labels:
    app: myapp
    department: DevOps
spec:
  selector:
    matchLabels:
      app: myapp
      department: DevOps
  template:
    metadata:
      name: mydaemonset
      labels:
        app: myapp
        department: DevOps
    spec:
      containers:
      - name: mycontainer
        image: nginx
        ports:
          - name: http
            containerPort: 80
          