apiVersion: v1
kind: ReplicationController
metadata:
  name: myreplicationcontroller4
spec:
  replicas: 3
  selector:
    app: myapp4
  template:
    metadata:
      name: mypod4
      labels:
        app: myapp4
    spec:
      containers:
      - name: mycontainer4
        image: nginx
        ports:
        - containerPort: 80